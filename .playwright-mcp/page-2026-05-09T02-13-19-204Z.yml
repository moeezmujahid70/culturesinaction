    - generic [ref=e24]:
      - blockquote [ref=e25]: "“For decades, my work has been driven by a single conviction: it should be possible — even simple — to design a workplace culture that employees actually want to be part of.”"
      - paragraph [ref=e26]: "I have approached this challenge from multiple vantage points — as a university department head, a corporate president, an entrepreneur, and a Senior Scientist at Gallup. Each role reinforced the same lesson: culture is not a vague concept. It is a system to be operated. The goal of this work is to make that system visible and actionable."
      - paragraph [ref=e27]: — Jerry
    - generic [ref=e29]:
      - generic [ref=e30]:
        - paragraph [ref=e31]: Our Mission
        - heading "A Culture Worth Belonging To" [level=2] [ref=e32]
        - paragraph [ref=e33]: At Cultures in Action, we believe that culture is not an invisible or unmanageable force — instead, it is a system infrastructure to be designed, operated, and improved.
        - paragraph [ref=e34]: Designing that infrastructure should be straightforward. By focusing on interlocking components of decision and behavioral principles, we replace soft intentions with a working set of rules that any team leader can implement.
        - paragraph [ref=e35]: "Our goal: every team should have its own Culture Operating System. Not values written in a planning retreat and forgotten by Friday. An explicit, owned blueprint for how the team actually intends to function — how decisions are made, how people are expected to behave, and how the team gets better over time."
      - complementary [ref=e36]:
        - heading "The Operational Difference" [level=3] [ref=e37]
        - list [ref=e38]:
          - listitem [ref=e39]: Move from intent to implementation
          - listitem [ref=e40]: Empower team leaders with actionable rules
          - listitem [ref=e41]: Create a shared blueprint for daily function
          - listitem [ref=e42]: Foster long-term cultural resilience
    - generic [ref=e44]:
      - generic [ref=e45]:
        - paragraph [ref=e46]: The Culture Quest Kickstart
        - heading "Where Every Team Begins" [level=2] [ref=e47]
        - paragraph [ref=e48]: Most culture initiatives stall before they start — because they belong to HR, not to the team. The Kickstart changes that. It is a structured, facilitated experience that puts every team in the designer's seat.
      - generic [ref=e49]:
        - article [ref=e50]:
          - paragraph [ref=e51]: "01"
          - heading "Build It Together" [level=3] [ref=e52]
          - paragraph [ref=e53]: The team designs its own COS — decision principles, behavioral expectations, accountability structures — through a guided, facilitated process that surfaces real consensus.
        - article [ref=e54]:
          - paragraph [ref=e55]: "02"
          - heading "Share It Openly" [level=3] [ref=e56]
          - paragraph [ref=e57]: The finished COS lives in Culture Quest Software — visible to every member, available to leadership, and ready to serve as a shared reference point.
        - article [ref=e58]:
          - paragraph [ref=e59]: "03"
          - heading "Improve It Continuously" [level=3] [ref=e60]
          - paragraph [ref=e61]: The COS is not a document filed and forgotten. The Feedback & Improvement Loop built into every Kickstart keeps the system alive, updated, and owned by the team.
