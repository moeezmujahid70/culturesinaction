      - paragraph [ref=e16]: Cultures in Action
      - heading "Engineering Cultures That Work" [level=1] [ref=e17]
      - paragraph [ref=e18]: Most organizations have values. Few have the systems to make those values a workplace reality.
      - link "Explore the Kickstart" [ref=e19] [cursor=pointer]:
