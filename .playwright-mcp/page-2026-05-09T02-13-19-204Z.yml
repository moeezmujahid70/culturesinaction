        - paragraph [ref=e76]: The Framework
        - heading "What a Culture Operating System Is" [level=2] [ref=e77]
        - paragraph [ref=e78]: A Culture Operating System (COS) is the explicit, designed set of rules and mechanisms that determine how a team operates day to day.
        - generic [ref=e79]:
          - paragraph [ref=e80]: The COS Answers These Questions
          - list [ref=e81]:
            - listitem [ref=e82]: Who decides, and how are tradeoffs resolved?
            - listitem [ref=e83]: What behavior is expected under pressure?
            - listitem [ref=e84]: What is actually measured and held accountable?
            - listitem [ref=e85]: How does the team learn and improve over time?
      - generic [ref=e86]:
        - paragraph [ref=e87]: A COS is not a mission statement or a list of values on a wall. It is a working set of interlocking components that together determine what actually happens when no one is watching.
