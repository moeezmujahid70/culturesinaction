<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">

  <rect x="0" y="0" width="1600" height="900" fill="#7b2d3a"/>
  <rect x="80" y="80" width="1440" height="740" fill="#8f3545" rx="12"/>

  <!-- Left gear -->
  <g transform="translate(638,450)">
    <circle r="28" fill="none" stroke="#f5e6a3" stroke-width="4.5"/>
    <circle r="11" fill="none" stroke="#f5e6a3" stroke-width="3"/>
    <circle r="4" fill="#f5e6a3"/>
    <g fill="#f5e6a3">
      <rect x="-5" y="-38" width="10" height="13" rx="2"/>
      <rect x="-5" y="25" width="10" height="13" rx="2"/>
      <rect x="-38" y="-5" width="13" height="10" rx="2"/>
      <rect x="25" y="-5" width="13" height="10" rx="2"/>
      <rect x="-29" y="-29" width="10" height="10" rx="2" transform="rotate(45,-24,-24)"/>
      <rect x="19" y="-29" width="10" height="10" rx="2" transform="rotate(45,24,-24)"/>
      <rect x="-29" y="19" width="10" height="10" rx="2" transform="rotate(45,-24,24)"/>
      <rect x="19" y="19" width="10" height="10" rx="2" transform="rotate(45,24,24)"/>
    </g>
  </g>

  <!-- Right gear -->
  <g transform="translate(962,450)">
    <circle r="28" fill="none" stroke="#f5e6a3" stroke-width="4.5"/>
    <circle r="11" fill="none" stroke="#f5e6a3" stroke-width="3"/>
    <circle r="4" fill="#f5e6a3"/>
    <g fill="#f5e6a3">
      <rect x="-5" y="-38" width="10" height="13" rx="2"/>
      <rect x="-5" y="25" width="10" height="13" rx="2"/>
      <rect x="-38" y="-5" width="13" height="10" rx="2"/>
      <rect x="25" y="-5" width="13" height="10" rx="2"/>
      <rect x="-29" y="-29" width="10" height="10" rx="2" transform="rotate(45,-24,-24)"/>
      <rect x="19" y="-29" width="10" height="10" rx="2" transform="rotate(45,24,-24)"/>
      <rect x="-29" y="19" width="10" height="10" rx="2" transform="rotate(45,-24,24)"/>
      <rect x="19" y="19" width="10" height="10" rx="2" transform="rotate(45,24,24)"/>
    </g>
  </g>

  <!-- Title -->
  <text x="800" y="476" text-anchor="middle" font-family="Georgia, serif" font-size="110" font-weight="700" fill="#f5e6a3" letter-spacing="10">SO WHAT DRILL</text>

  <!-- Divider -->
  <line x1="480" y1="520" x2="1120" y2="520" stroke="#f5e6a3" stroke-width="1.5" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="800" y="580" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="400" fill="#f0d0d5" letter-spacing="12">CULTURE OPERATING SYSTEMS</text>

</svg>
